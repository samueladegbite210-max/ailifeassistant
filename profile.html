<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile - AI Life Assistant</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0B0F1A;
    color:white;
    padding-bottom:100px;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background:#2563EB;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1D4ED8;
}

.profile-card{
    background:#1F2937;
    padding:20px;
    margin-top:20px;
    border-radius:15px;
    line-height:1.8;
}

.profile-card h2{
    margin-bottom:15px;
    color:#60A5FA;
}
</style>

</head>

<body>

<header>
👤 My Profile
</header>

<div class="container">

<input
type="text"
id="name"
placeholder="👤 Full Name">

<input
type="email"
id="email"
placeholder="📧 Email Address">

<input
type="tel"
id="phone"
placeholder="📱 Phone Number">

<button onclick="saveProfile()">
💾 Save Profile
</button>

<div class="profile-card">

<h2>Profile Preview</h2>

<p><strong>Name:</strong> <span id="previewName">Not Set</span></p>

<p><strong>Email:</strong> <span id="previewEmail">Not Set</span></p>

<p><strong>Phone:</strong> <span id="previewPhone">Not Set</span></p>

</div>

</div>

<div class="navbar">
    <a href="dashboard.html">🏠<br>Home</a>
    <a href="chat.html">🤖<br>AI</a>
    <a href="notes.html">📝<br>Notes</a>
    <a href="calendar.html">📅<br>Calendar</a>
    <a href="profile.html">👤<br>Profile</a>
</div>

<script>

const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const phoneInput = document.getElementById("phone");

nameInput.value = localStorage.getItem("username") || "";
emailInput.value = localStorage.getItem("email") || "";
phoneInput.value = localStorage.getItem("phone") || "";

function updatePreview(){

    document.getElementById("previewName").textContent =
        nameInput.value || "Not Set";

    document.getElementById("previewEmail").textContent =
        emailInput.value || "Not Set";

    document.getElementById("previewPhone").textContent =
        phoneInput.value || "Not Set";
}

function saveProfile(){

    localStorage.setItem("username", nameInput.value);

    localStorage.setItem("email", emailInput.value);

    localStorage.setItem("phone", phoneInput.value);

    updatePreview();

    alert("✅ Profile Saved!");

    nameInput.focus();
}

updatePreview();

[nameInput, emailInput, phoneInput].forEach(function(input){

    input.addEventListener("keypress", function(event){

        if(event.key === "Enter"){
            saveProfile();
        }

    });

});

</script>

</body>
</html>
