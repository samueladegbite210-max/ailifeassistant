<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Life Assistant</title>

<link rel="stylesheet" href="style.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0B0F1A;
    color:white;
    text-align:center;
    padding:30px;
    padding-bottom:100px;
}

.container{
    max-width:500px;
    margin:auto;
}

.logo{
    font-size:60px;
}

h1{
    font-size:38px;
    margin-top:15px;
}

.tagline{
    color:#B5C0D0;
    margin:15px 0 30px;
    font-size:18px;
}

button{
    width:100%;
    padding:16px;
    margin:10px 0;
    border:none;
    border-radius:14px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.primary{
    background:#2563EB;
    color:white;
}

.secondary{
    background:#7C3AED;
    color:white;
}

button:hover{
    opacity:0.9;
}

.card{
    background:#1D232D;
    padding:20px;
    border-radius:18px;
    margin-top:25px;
    text-align:left;
}

.card h2{
    margin-bottom:15px;
}

.feature{
    padding:10px 0;
    font-size:18px;
}

footer{
    margin-top:40px;
    color:#999;
    font-size:14px;
}
</style>

</head>

<body>

<div class="container">

    <div class="logo">🤖</div>

    <h1>AI Life Assistant</h1>

    <p class="tagline">
        Your smart companion for everyday life.
    </p>

    <a href="dashboard.html">
        <button class="primary">
            Get Started
        </button>
    </a>

    <a href="chat.html">
        <button class="secondary">
            Ask AI
        </button>
    </a>

    <div class="card">

        <h2>Features</h2>

        <div class="feature">🤖 AI Chat</div>

        <div class="feature">✅ Tasks</div>

        <div class="feature">📝 Notes</div>

        <div class="feature">📅 Calendar</div>

        <div class="feature">🎯 Goals</div>

    </div>

    <footer>
        Built by<br><br>
        <b>Adegbite Samuel Abayomi</b>
    </footer>

</div>

<div class="navbar">
    <a href="dashboard.html">🏠<br>Home</a>
    <a href="chat.html">🤖<br>AI</a>
    <a href="notes.html">📝<br>Notes</a>
    <a href="calendar.html">📅<br>Calendar</a>
    <a href="profile.html">👤<br>Profile</a>
</div>

</body>
</html>
