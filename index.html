<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen">
    <div class="max-w-2xl mx-auto p-4">
        <header class="bg-emerald-700 p-6 rounded-3xl text-white mb-6">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fas fa-brain text-4xl"></i>
                    <div>
                        <h1 class="text-3xl font-bold">LifeAI</h1>
                        <p>Global AI Life Assistant</p>
                    </div>
                </div>
                <button onclick="toggleDark()" class="text-3xl">🌙</button>
            </div>
        </header>

        <div class="flex border-b mb-6">
            <button onclick="switchTab(0)" class="flex-1 py-4 tab-active" id="tab0">Tasks</button>
            <button onclick="switchTab(1)" class="flex-1 py-4" id="tab1">Budget</button>
            <button onclick="switchTab(2)" class="flex-1 py-4" id="tab2">Premium</button>
        </div>

        <div id="content"></div>
    </div>

    <script>
        function switchTab(n) {
            document.querySelectorAll('button').forEach((b,i) => b.classList.toggle('tab-active', i===n));
            const content = document.getElementById('content');
            if (n === 0) {
                content.innerHTML = `<button onclick="addTask()" class="w-full py-4 bg-emerald-600 text-white rounded-3xl">+ New Task</button>`;
            } else if (n === 1) {
                content.innerHTML = `<p class="text-center py-12 text-gray-500">Budget coming soon</p>`;
            } else {
                content.innerHTML = `
                    <div class="bg-white dark:bg-gray-800 rounded-3xl p-8 text-center">
                        <h2 class="text-3xl font-bold mb-4">Go Premium</h2>
                        <p class="mb-8 text-gray-600">Unlock unlimited tasks, voice input, charts, and more.</p>
                        <div class="text-5xl font-bold mb-2">₦1,500</div>
                        <p class="text-sm text-gray-500 mb-8">per month</p>
                        <button onclick="payWithPaystack()" class="w-full py-5 bg-emerald-600 text-white rounded-3xl text-lg font-medium">Subscribe Now</button>
                        <p class="text-xs text-gray-500 mt-6">Secure payment via Paystack</p>
                    </div>
                `;
            }
        }

        function addTask() {
            const text = prompt("New task?");
            if(text) alert("Task added: " + text);
        }

        function toggleDark() {
            document.documentElement.classList.toggle('dark');
        }

        function payWithPaystack() {
            alert("✅ Payment page would open here (Paystack integration).\n\nIn real app, money goes to your account.");
        }

        window.onload = () => switchTab(0);
    </script>
</body>
</html>
