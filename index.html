<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen">
    <div class="max-w-2xl mx-auto p-4">
        <header class="bg-gradient-to-r from-emerald-700 to-teal-600 p-6 rounded-3xl text-white mb-8 shadow-xl">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-3xl">🧠</div>
                    <div>
                        <h1 class="text-4xl font-bold">LifeAI</h1>
                        <p class="text-emerald-100">Global AI Life Assistant</p>
                    </div>
                </div>
                <button onclick="toggleDark()" class="text-3xl">🌙</button>
            </div>
        </header>

        <div class="flex border-b mb-8">
            <button onclick="switchTab(0)" class="flex-1 py-4 tab-active" id="tab0">Tasks</button>
            <button onclick="switchTab(1)" class="flex-1 py-4" id="tab1">Progress</button>
            <button onclick="switchTab(2)" class="flex-1 py-4" id="tab2">Report</button>
        </div>

        <div id="content"></div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function switchTab(n) {
            document.querySelectorAll('button').forEach((b,i) => b.classList.toggle('tab-active', i===n));
            const content = document.getElementById('content');
            if (n === 0) {
                content.innerHTML = `
                    <button onclick="startVoice()" class="w-full py-5 bg-emerald-600 text-white rounded-3xl mb-8 flex items-center justify-center gap-3 text-lg">
                        <i class="fas fa-microphone"></i> Speak to Add Task
                    </button>
                    <div id="task-list" class="space-y-3"></div>
                `;
                renderTasks();
            } else if (n === 1) {
                content.innerHTML = `<div class="bg-white dark:bg-gray-800 p-8 rounded-3xl text-center"><div class="text-6xl mb-4">📊</div><p class="text-xl">Progress Charts</p></div>`;
            } else {
                content.innerHTML = `<div class="bg-white dark:bg-gray-800 p-8 rounded-3xl text-center"><h2 class="text-2xl font-bold">Monthly Summary</h2><p>${tasks.filter(t=>t.done).length} tasks completed</p></div>`;
            }
        }

        function renderTasks() {
            const container = document.getElementById('task-list');
            container.innerHTML = tasks.map((t,i) => `
                <div class="bg-white dark:bg-gray-800 p-5 rounded-3xl flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${i})">
                        <span class="${t.done?'line-through text-gray-400':''}">${t.text}</span>
                    </div>
                    <button onclick="deleteTask(${i})" class="text-red-500">🗑</button>
                </div>
            `).join('');
        }

        function toggleTask(i) {
            tasks[i].done = !tasks[i].done;
            saveTasks();
            renderTasks();
        }

        function deleteTask(i) {
            if(confirm("Delete task?")) {
                tasks.splice(i,1);
                saveTasks();
                renderTasks();
            }
        }

        function startVoice() {
            if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
                const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                recognition.onresult = (event) => {
                    const text = event.results[0][0].transcript;
                    tasks.push({text, done:false});
                    saveTasks();
                    renderTasks();
                    alert("Task added: " + text);
                };
                recognition.start();
            } else {
                const text = prompt("Type your task:");
                if(text) {
                    tasks.push({text, done:false});
                    saveTasks();
                    renderTasks();
                }
            }
        }

        function toggleDark() {
            document.documentElement.classList.toggle('dark');
        }

        window.onload = () => switchTab(0);
    </script>
</body>
</html>
