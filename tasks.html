
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">

    <h1>✅ My Tasks</h1>

    <p>Stay organized and productive</p>

</header>

<div class="container">

    <div class="card">

        <input
            type="text"
            id="taskInput"
            placeholder="Enter a new task">

        <select id="taskPriority">
            <option value="High">🔴 High</option>
            <option value="Medium">🟡 Medium</option>
            <option value="Low">🟢 Low</option>
        </select>

        <button onclick="addTask()">
            Add Task
        </button>

    </div>

    <div class="card">

<h2>Your Tasks</h2>

<ul id="taskList"></ul>

    </div>

</div>
<div class="card">

<h2>📊 Task Summary</h2>

<p>Total Tasks:
<span id="totalTasks">0</span></p>

<p>Completed:
<span id="completedTasks">0</span></p>

<p>Pending:
<span id="pendingTasks">0</span></p>

</div>

<div class="card">

<input
type="text"
id="searchTask"
placeholder="🔍 Search Tasks">

</div>

<div class="card">

<h2>📈 Task Progress</h2>

<div class="progress-container">

<div
id="taskProgressBar"
class="progress-bar">
</div>

</div>

<p id="taskProgressText">

0% Completed

</p>

</div>
<div class="navbar">

<a href="dashboard.html">🏠<br>Home</a>

<a href="chat.html">🤖<br>AI</a>

<a href="tasks.html">✅<br>Tasks</a>

<a href="calendar.html">📅<br>Calendar</a>

<a href="profile.html">👤<br>Profile</a>

</div>

<script src="tasks.js"></script>

</body>
</html>
