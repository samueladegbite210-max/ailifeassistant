<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar - AI Life Assistant</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0B0F1A;
    color:white;
    padding-bottom:100px;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background:#2563EB;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1D4ED8;
}

.event{
    background:#1F2937;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
📅 Calendar
</header>

<div class="container">

 <div class="card">

    <h2>📅 Add New Event</h2>

    <input
        type="text"
        id="eventTitle"
        placeholder="Event Title">

    <input
        type="date"
        id="eventDate">

    <input
        type="time"
        id="eventTime">

    <input
        type="text"
        id="eventLocation"
        placeholder="Location">

    <textarea
        id="eventNotes"
        placeholder="Notes"></textarea>

    <select id="eventReminder">
        <option value="none">🔕 No Reminder</option>
        <option value="10">10 Minutes Before</option>
        <option value="30">30 Minutes Before</option>
        <option value="60">1 Hour Before</option>
        <option value="1440">1 Day Before</option>
    </select>

    <select id="eventRepeat">
        <option value="none">No Repeat</option>
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
        <option value="yearly">Yearly</option>
    </select>

    <button onclick="addEvent()">
        Save Event
    </button>

</div>

<div class="card">

    <h2>📆 Upcoming Events</h2>

    <ul id="eventList"></ul>

</div>

    <div id="events"></div>

</div>

<div class="navbar">
    <a href="dashboard.html">🏠<br>Home</a>
    <a href="chat.html">🤖<br>AI</a>
    <a href="notes.html">📝<br>Notes</a>
    <a href="calendar.html">📅<br>Calendar</a>
    <a href="profile.html">👤<br>Profile</a>
</div>

<script>
const eventsDiv = document.getElementById("events");

function loadEvents(){
    eventsDiv.innerHTML = localStorage.getItem("events") || "";
}

loadEvents();

function saveEvent(){

    const date = document.getElementById("date").value;
    const event = document.getElementById("event").value;

    if(date === "" || event === "") return;

    eventsDiv.innerHTML += `
        <div class="event">
            📅 <b>${date}</b><br>
            ${event}
        </div>
    `;

    localStorage.setItem("events", eventsDiv.innerHTML);

    document.getElementById("event").value = "";
    document.getElementById("date").value = "";
}
</script>

</body>
</html>
