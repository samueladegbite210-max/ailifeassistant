<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - AI Life Assistant</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0B0F1A;
color:white;
padding:20px;
}

.header{
margin-bottom:25px;
}

.header h1{
font-size:30px;
}

.header p{
color:#aaa;
margin-top:5px;
}

.card{
background:#161B22;
padding:20px;
border-radius:18px;
margin-bottom:20px;
}

.card h2{
margin-bottom:10px;
}

.button{
display:block;
text-decoration:none;
text-align:center;
background:#2563EB;
color:white;
padding:16px;
border-radius:14px;
margin-top:15px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.box{
background:#1D232D;
padding:20px;
border-radius:15px;
text-align:center;
font-size:18px;
}
</style>

</head>

<body>

<div class="header">
<h1>👋 Good Morning, Samuel</h1>
<p>Let's make today productive.</p>
</div>

<div class="card">
<h2>🤖 AI Assistant</h2>
<p>How can I help you today?</p>

<a href="chat.html" class="button">
Ask AI
</a>
</div>

<div class="card">
<h2>Today's Tasks</h2>

<p>✅ Build AI Life Assistant</p>
<p>⬜ Review project ideas</p>
<p>⬜ Plan tomorrow</p>
</div>

<div class="card">
<h2>Today's Goal</h2>

<p>🎯 Finish Version 1.0 Dashboard</p>
</div>

<div class="grid">

<div class="box">
📝<br>Notes
</div>

<div class="box">
📅<br>Calendar
</div>

<div class="box">
🎯<br>Goals
</div>

<div class="box">
⚙️<br>Settings
</div>

</div>

</body>
</html>
